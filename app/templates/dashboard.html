{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}

{% block content %}
<h4 class="fw-bold mb-4" style="color:#1e2a45">Dashboard</h4>

<div class="row g-3 mb-4" id="stat-cards">
  <div class="col-6 col-md-3">
    <div class="card stat-card">
      <div class="card-body">
        <div class="text-muted small mb-1">Llamadas pendientes</div>
        <div class="stat-number text-primary" id="sc-pending">—</div>
      </div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="card stat-card">
      <div class="card-body">
        <div class="text-muted small mb-1">Reagendadas hoy</div>
        <div class="stat-number text-danger" id="sc-rescheduled">—</div>
      </div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="card stat-card">
      <div class="card-body">
        <div class="text-muted small mb-1">Sin teléfono</div>
        <div class="stat-number text-warning" id="sc-nophone">—</div>
      </div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="card stat-card">
      <div class="card-body">
        <div class="text-muted small mb-1">Llamadas hoy</div>
        <div class="stat-number text-success" id="sc-today">—</div>
      </div>
    </div>
  </div>
</div>

<div class="row g-3">
  <div class="col-md-5">
    <div class="card border-0 shadow-sm" style="border-radius:12px">
      <div class="card-body">
        <div class="section-title">Estado de estudiantes</div>
        <canvas id="statusChart" height="220"></canvas>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card border-0 shadow-sm" style="border-radius:12px">
      <div class="card-body">
        <div class="section-title">Resultados de llamadas</div>
        <canvas id="outcomeChart" height="220"></canvas>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card border-0 shadow-sm" style="border-radius:12px">
      <div class="card-body">
        <div class="section-title">Listas activas</div>
        <div id="batches-list" class="small"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadDashboard() {
  const [counts, summary] = await Promise.all([
    fetch('/api/calls/dashboard_counts').then(r => r.json()),
    fetch('/api/reports/summary').then(r => r.json()),
  ]);

  document.getElementById('sc-pending').textContent = counts.pending;
  document.getElementById('sc-rescheduled').textContent = counts.rescheduled_today;
  document.getElementById('sc-nophone').textContent = counts.no_phone;
  document.getElementById('sc-today').textContent = counts.calls_today;

  // Status chart
  const statusLabels = Object.keys(summary.status_counts);
  const statusData = Object.values(summary.status_counts);
  new Chart(document.getElementById('statusChart'), {
    type: 'doughnut',
    data: { labels: statusLabels, datasets: [{ data: statusData,
      backgroundColor: ['#cff4fc','#fff3cd','#d1e7ff','#f8d7da','#d1e7dd','#dee2e6','#f8d7da','#d1e7dd'] }] },
    options: { plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } } }
  });

  // Outcome chart
  const oLabels = Object.keys(summary.outcome_counts);
  const oData = Object.values(summary.outcome_counts);
  new Chart(document.getElementById('outcomeChart'), {
    type: 'bar',
    data: { labels: oLabels, datasets: [{ data: oData, backgroundColor: '#4472C4' }] },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { precision: 0 } } } }
  });

  // Batches
  const bl = document.getElementById('batches-list');
  if (!summary.batches.length) { bl.innerHTML = '<span class="text-muted">Sin listas importadas.</span>'; return; }
  bl.innerHTML = summary.batches.map(b => `
    <div class="mb-2 p-2 rounded" style="background:${b.is_active ? '#d1e7dd' : '#f8d7da'}">
      <div class="fw-semibold text-truncate" title="${b.filename}">${b.filename}</div>
      <div class="text-muted">${b.student_count} estudiantes · vence ${b.validity_date}</div>
      <span class="badge ${b.is_active ? 'bg-success' : 'bg-secondary'}">${b.is_active ? 'Activa' : 'Vencida'}</span>
    </div>`).join('');
}
loadDashboard();
</script>
{% endblock %}
